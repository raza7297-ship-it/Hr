<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aapka Cart</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .cart-item {
            border-bottom: 1px solid #ccc;
            padding: 10px 0;
        }
        .checkout-btn {
            background-color: #28a745;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h2>Aapka Shopping Cart</h2>

    <div id="cart-items-container">
        <div class="cart-item">
            <p><strong>Item:</strong> Ghadi (Watch)</p>
            <p><strong>Price:</strong> ₹500</p>
        </div>
    </div>

    <h3>Total: ₹500</h3>

    <button class="checkout-btn">Checkout Karein</button>

    <br><br>
    <a href="index.html">⬅ Wapas Dukan Par Jayein</a>

</body>
</html>
